<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Multi-Agent // Terminal</title>
<script>
// 跟随门户主题:读 localStorage,监听 storage 事件即时换肤(同源 iframe 自动收到)
(function(){
  var KEY='ai-demos-theme', VALID=['mono-light','light','deepblue','cyber','machine'];
  function apply(t){ if(VALID.indexOf(t)<0)t='mono-light'; document.documentElement.setAttribute('data-demo-theme',t); }
  try{ apply(localStorage.getItem(KEY)); }catch(e){ apply('mono-light'); }
  window.addEventListener('storage', function(e){ if(e.key===KEY) apply(e.newValue); });
})();
</script>
<style>
/* ===== 五主题调色板(对齐门户 theme.css) ===== */
:root, [data-demo-theme="mono-light"]{
  --d-bg:#fafafa;--d-surface:#fff;--d-surface-soft:#f8f8f9;--d-border:rgba(0,0,0,.12);
  --d-text:#09090b;--d-dim:#71717a;--d-accent:#09090b;--d-accent-text:#fafafa;--d-danger:#dc2626;
  --d-font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
}
[data-demo-theme="light"]{
  --d-bg:#f6f7fb;--d-surface:#fff;--d-surface-soft:#f8fafc;--d-border:#e2e8f0;
  --d-text:#0f172a;--d-dim:#64748b;--d-accent:#4f46e5;--d-accent-text:#fff;--d-danger:#dc2626;
  --d-font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
}
[data-demo-theme="deepblue"]{
  --d-bg:#0b1120;--d-surface:#111827;--d-surface-soft:#172033;--d-border:#1f2937;
  --d-text:#f8fafc;--d-dim:#94a3b8;--d-accent:#2563eb;--d-accent-text:#fff;--d-danger:#f87171;
  --d-font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
}
[data-demo-theme="cyber"]{
  --d-bg:#050507;--d-surface:#0f0f12;--d-surface-soft:#141417;--d-border:#27272a;
  --d-text:#e4e4e7;--d-dim:#71717a;--d-accent:#a3e635;--d-accent-text:#050507;--d-danger:#ff5577;
  --d-font:"JetBrains Mono",ui-monospace,Consolas,"PingFang SC","Microsoft YaHei",monospace;
}
[data-demo-theme="machine"]{
  --d-bg:#0a0a0c;--d-surface:#0e0e11;--d-surface-soft:#111114;--d-border:rgba(227,179,65,.30);
  --d-text:#e3b341;--d-dim:#9a8c5a;--d-accent:#e3b341;--d-accent-text:#0a0a0c;--d-danger:#ff4500;
  --d-font:"JetBrains Mono",ui-monospace,Consolas,"PingFang SC","Microsoft YaHei",monospace;
}

/* nexus 内部变量映射到 token(文本=--d-text,强调=--d-accent),全站随主题变色 */
:root {
  --bg: var(--d-bg);
  --panel: var(--d-surface);
  --panel-soft: var(--d-surface-soft);
  --yellow: var(--d-text);
  --accent: var(--d-accent);
  --accent-text: var(--d-accent-text);
  --dim: var(--d-dim);
  --muted: var(--d-dim);
  --cyan: var(--d-accent);
  --red: var(--d-danger);
  --border: var(--d-border);
  --border-soft: var(--d-border);
  --font: var(--d-font);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 22px;
  font-family: var(--font);
  color: var(--yellow);
  background:
    linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px),
    var(--bg);
  background-size: 40px 40px, 40px 40px, auto;
  text-shadow: 0 0 6px color-mix(in srgb, var(--accent) 16%, transparent);
}
/* CRT 扫描线叠加 */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.025) 50%);
  background-size: 100% 4px;
  z-index: 9;
}
.container { max-width: 920px; margin: 0 auto; position: relative; z-index: 1; }

/* 标题栏 */
.term-head {
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  margin-bottom: 14px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 13px;
}
.term-head .dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: blink 1.4s steps(2, start) infinite;
}
.term-head .spacer { flex: 1; }
.term-head .meta { color: var(--dim); font-size: 11px; letter-spacing: 0.1em; }
@keyframes blink { 50% { opacity: 0.25; } }

/* 消息区 */
.messages {
  position: relative;
  border: 1px solid var(--border);
  border-radius: 0;
  height: 60vh;
  overflow-y: auto;
  padding: 16px;
  margin-bottom: 14px;
  background: var(--panel);
}
/* 边角括号 */
.messages::before, .messages::after {
  content: "";
  position: absolute;
  width: 12px; height: 12px;
  border: 0 solid var(--accent);
  opacity: 0.7;
}
.messages::before { top: -1px; left: -1px; border-top-width: 2px; border-left-width: 2px; }
.messages::after { bottom: -1px; right: -1px; border-bottom-width: 2px; border-right-width: 2px; }

.message {
  margin: 10px 0;
  padding: 10px 12px;
  background: var(--panel-soft);
  border-left: 2px solid var(--border-soft);
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
}
.msg-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 5px;
}
.user { border-left-color: var(--accent); }
.user .msg-label { color: var(--yellow); }
.thought { color: var(--dim); font-size: 13px; border-left-color: var(--muted); }
.tool { color: var(--cyan); border-left-color: var(--cyan); text-shadow: 0 0 6px rgba(0,255,255,0.2); }
.final { border-left-color: var(--accent); color: var(--yellow); }
.final .msg-label { color: var(--yellow); }
.caret::after {
  content: "▋";
  animation: blink 1s steps(2, start) infinite;
  margin-left: 1px;
}

/* 输入区 */
.input-area { display: flex; gap: 10px; }
input {
  flex: 1;
  padding: 11px 12px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--yellow);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
}
input::placeholder { color: var(--muted); }
input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--border); }
button {
  padding: 11px 22px;
  background: var(--accent);
  color: var(--accent-text);
  border: 1px solid var(--accent);
  font-family: var(--font);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

/* 滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); }

@media (prefers-reduced-motion: reduce) {
  .term-head .dot, .caret::after { animation: none; }
  body::after { display: none; }
}
</style>
</head>
<body>
<div class="container">
  <div class="term-head">
    <span class="dot"></span>
    <span>Nexus // Multi-Agent Terminal</span>
    <span class="spacer"></span>
    <span class="meta">ENGINE: DEEPSEEK · STATUS: ONLINE</span>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="input" placeholder="输入指令…" onkeypress="if(event.key==='Enter') send()">
    <button id="send-btn" onclick="send()">发送</button>
  </div>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// 用户输入:即时显示(不打字)
function addMessage(content, cls, label) {
  const div = document.createElement('div');
  div.className = 'message ' + cls;
  if (label) {
    const lb = document.createElement('div');
    lb.className = 'msg-label';
    lb.textContent = label;
    div.appendChild(lb);
  }
  const body = document.createElement('div');
  body.textContent = content;
  div.appendChild(body);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

// ---- 打字机队列:规划过程([ORCHESTRATOR]/[PLANNER]/工具)与最终答案逐条流式回显 ----
const typeQueue = [];
let typing = false;

function enqueue(job) { typeQueue.push(job); pump(); }

function pump() {
  if (typing) return;
  const job = typeQueue.shift();
  if (!job) return;
  if (job.done) { sendBtn.disabled = false; pump(); return; }
  typing = true;
  renderTyped(job, () => { typing = false; pump(); });
}

function renderTyped(job, onDone) {
  const div = document.createElement('div');
  div.className = 'message ' + job.cls;
  if (job.label) {
    const lb = document.createElement('div');
    lb.className = 'msg-label';
    lb.textContent = job.label;
    div.appendChild(lb);
  }
  const body = document.createElement('div');
  body.className = 'caret';
  div.appendChild(body);
  messages.appendChild(div);

  const text = job.content || '';
  if (!text) { body.classList.remove('caret'); onDone(); return; }
  // 过程日志打得更快,最终答案稍慢;reduced-motion 下进一步加速但仍逐字
  let i = 0;
  const step = Math.max(reduceMotion ? 6 : (job.isFinal ? 1 : 2),
                        Math.round(text.length / (job.isFinal ? 180 : 90)));
  const delay = reduceMotion ? 6 : (job.isFinal ? 14 : 9);
  const timer = setInterval(() => {
    i += step;
    body.textContent = text.slice(0, i);
    messages.scrollTop = messages.scrollHeight;
    if (i >= text.length) {
      body.textContent = text;
      body.classList.remove('caret');
      clearInterval(timer);
      onDone();
    }
  }, delay);
}

function send() {
  const query = input.value.trim();
  if (!query) return;
  addMessage(query, 'user', '▸ QUERY');
  input.value = '';
  sendBtn.disabled = true;

  const form = new FormData();
  form.append('query', query);
  fetch('chat', { method: 'POST', body: form })
    .then(response => {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let final = '';
      function read() {
        reader.read().then(({ done, value }) => {
          if (done) {
            if (final) enqueue({ content: final, cls: 'final', label: '■ RESPONSE', isFinal: true });
            enqueue({ done: true });   // 队列排空后再恢复发送按钮
            return;
          }
          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');
          let event = null, data = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) event = line.slice(7);
            else if (line.startsWith('data: ')) data = line.slice(6);
            else if (line === '' && event) {
              const obj = JSON.parse(data);
              if (event === 'final_answer') final = obj.content;
              else if (event === 'agent_thought') enqueue({ content: obj.content, cls: 'thought', label: '[' + obj.agent + ']' });
              else if (event === 'planner_thought') enqueue({ content: obj.content, cls: 'thought', label: '[planner]' });
              else if (event === 'tool_call') enqueue({ content: obj.agent + ' / ' + obj.tool, cls: 'tool', label: '⚙ TOOL CALL' });
              event = null; data = '';
            }
          }
          read();
        });
      }
      read();
    })
    .catch(() => { sendBtn.disabled = false; });
}
</script>
</body>
</html>
