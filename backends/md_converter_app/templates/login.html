{% extends "base.html" %}
{% block title %}登录 - DocHub{% endblock %}
{% block content %}
<div class="auth-box">
  <h1>DocHub</h1>
  <p>Markdown 文档站</p>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login">
    <input type="password" name="password" placeholder="输入密码" required>
    <button type="submit">登录</button>
  </form>
</div>
{% endblock %}
