server {
    listen 80;
    server_name www.shiyuan-wreg.cloud;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.shiyuan-wreg.cloud;

    ssl_certificate /etc/letsencrypt/live/www.shiyuan-wreg.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.shiyuan-wreg.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 门户外壳（SPA，history 路由回退到 index.html）
    root /usr/share/nginx/html;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }

    # 学习站点（静态，base=/learn/）
    location /learn/ {
        alias /usr/share/nginx/learn/;
        try_files $uri $uri/ /learn/index.html;
    }

    # RAG 后端
    location /rag/ {
        proxy_pass http://rag:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Function Calling 后端
    location /fc/ {
        proxy_pass http://fc:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nexus 后端（SSE 需要关闭代理缓冲）
    location /nexus/ {
        proxy_pass http://nexus:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }
}
