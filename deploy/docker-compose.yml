services:
  rag:
    build:
      context: ..
      dockerfile: backends/rag_app/Dockerfile
    env_file: ../.env
    restart: always
    expose: ["8001"]

  fc:
    build:
      context: ..
      dockerfile: backends/fc_app/Dockerfile
    env_file: ../.env
    restart: always
    expose: ["8002"]

  nexus:
    build:
      context: ..
      dockerfile: backends/nexus_app/Dockerfile
    env_file: ../.env
    restart: always
    expose: ["8003"]
    depends_on: [rag, fc]

  md_converter:
    build:
      context: ..
      dockerfile: backends/md_converter_app/Dockerfile
    env_file: ../.env
    restart: always
    expose: ["8004"]
    volumes:
      - ../backends/md_converter_app/output:/app/output
      - ../backends/md_converter_app/uploads:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    restart: always
    depends_on: [rag, fc, nexus, md_converter]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../frontends/portfolio/dist:/usr/share/nginx/html:ro
      - ../frontends/nexus-learning-web/dist:/usr/share/nginx/learn:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    restart: always
